/* =========================================================================
 DS EXPERIENCES — UNIFIED B2C BOOKING PORTAL (Phase 1, per PRD v1.0 15-Jul-2026)
 Single-file prototype: HTML + Tailwind CSS (CDN) + vanilla JS.
 Scope: B2C only, as agreed with client for this milestone. B2B reseller
 portal, points/tier engine and the Phase-2 membership card are out of
 scope here but the pricing/account/booking architecture below does not
 block them being added later (per PRD section 10.1 "Phase treatment").
 All customer-facing prices are shown in INR only, per client instruction.
 ========================================================================= */

/* -------------------------------------------------------------------------
   1. MOCK SUPPLIER / INVENTORY LAYER
   In production this array is built at request-time by the aggregation
   & normalisation service (PRD §3) from 2–3 live supplier APIs, ranked by
   total eligible cost with automatic failover to the next eligible source
   (PRD §3.2). Supplier identity and net cost are confidential and must
   never reach the browser (PRD §2, "Confidentiality requirement") — so
   here they only ever feed the pricing engine below and are stripped
   before the event objects are exposed to the UI.
------------------------------------------------------------------------- */
const FX = { GBP: 106.40, EUR: 92.10, USD: 88.20, INR: 1 };
const FX_BUFFER = 2;      // ₹ buffer per unit of foreign currency (settlement safety margin)
const B2C_MARGIN = 0.15;  // configurable B2C mark-up, illustrative calc per PRD §4
const GST_RATE = 0.18;    // GST on DS Experiences service fee

/* INTERNAL — SUPPLIER SETTLEMENT (never rendered to the customer)
   Vendor payouts are made in the supplier's native currency (GBP in this
   build). Before authorising the supplier payment, the confirmed booking
   value is converted back at the FX rate locked at time of booking plus
   the ₹2/unit conversion buffer, and GST is deducted, per DS Experiences
   finance policy captured in the requirements workshop. This function is
   for backend/admin use only and is intentionally not wired to any UI. */
function internalSupplierSettlement(netForeignAmount, currency){
  const rate = (FX[currency]||FX.GBP) + FX_BUFFER;
  const grossINR = netForeignAmount * rate;
  const gst = grossINR * GST_RATE;
  return { currency, rate, grossINR: Math.round(grossINR), gst: Math.round(gst), payableINR: Math.round(grossINR - gst) };
}

function priceToINR(netAmount, currency){
  const rate = (FX[currency]||FX.GBP) + FX_BUFFER;
  const base = netAmount * rate;
  const marked = base * (1 + B2C_MARGIN);
  return Math.round(marked / 5) * 5; // round to nearest ₹5
}
function fmtINR(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }

// Rank & strip supplier sources → lowest eligible converted cost wins (PRD §3.2 "Source priority")
EVENTS.forEach(ev=>{
  ev.tiers.forEach(t=>{
    const ranked = t._sources.map(s=>({...s, inr: priceToINR(s.v, s.c)})).sort((a,b)=>a.inr-b.inr);
    t.priceINR = ranked[0].inr;
    t._winningCurrency = ranked[0].c; // internal only, never rendered
    delete t._sources;
  });
  ev.fromPrice = Math.min(...ev.tiers.map(t=>t.priceINR));
});

   3. STATE (persisted to localStorage — this is a standalone delivery
   file, not a Claude artifact, so browser storage is appropriate here)
------------------------------------------------------------------------- */
const State = {
  cart: JSON.parse(localStorage.getItem('dse_cart')||'[]'),
  user: JSON.parse(localStorage.getItem('dse_user')||'null'),
  bookings: JSON.parse(localStorage.getItem('dse_bookings')||'[]'),
  checkout: { customer:null, attendees:[], terms:false, payment:null },
};
function saveCart(){ localStorage.setItem('dse_cart', JSON.stringify(State.cart)); }
function saveUser(){ localStorage.setItem('dse_user', JSON.stringify(State.user)); }
function saveBookings(){ localStorage.setItem('dse_bookings', JSON.stringify(State.bookings)); }

function cartCount(){ return State.cart.reduce((n,i)=>n+i.qty,0); }
function cartSubtotal(){ return State.cart.reduce((n,i)=>n+i.priceINR*i.qty,0); }
function cartServiceFee(){ return Math.round(cartSubtotal()*0.03); }
function cartGST(){ return Math.round(cartServiceFee()*GST_RATE); }
function cartTotal(){ return cartSubtotal()+cartServiceFee()+cartGST(); }

function addToCart(eventId, tierId, qty){
  const ev = EVENTS.find(e=>e.id===eventId); const t = ev.tiers.find(x=>x.id===tierId);
  const existing = State.cart.find(i=>i.eventId===eventId && i.tierId===tierId);
  if(existing){ existing.qty += qty; } else {
    State.cart.push({ eventId, tierId, qty, priceINR:t.priceINR, name:t.name, eventTitle:ev.title, venue:ev.venue, date:ev.date, image:ev.image });
  }
  saveCart(); renderCartBadge(); toast(`Added to cart — ${t.name}`); openCart();
}
function removeFromCart(eventId, tierId){ State.cart = State.cart.filter(i=>!(i.eventId===eventId&&i.tierId===tierId)); saveCart(); renderApp(); }
function setQty(eventId, tierId, qty){
  const item = State.cart.find(i=>i.eventId===eventId&&i.tierId===tierId);
  if(!item) return; item.qty = Math.max(1, Math.min(10, qty)); saveCart(); renderApp();
}

function toast(msg){
  const el = document.createElement('div');
  el.className = 'toast glass border border-gold-400/30 text-bone-200 text-sm px-4 py-3 rounded shadow-xl flex items-center gap-2';
  el.innerHTML = `<span class="text-gold-200">✓</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .4s'; setTimeout(()=>el.remove(),400); }, 2600);
}

function route(){
  const hash = location.hash.replace('#','') || '/';
  const [path, qs] = hash.split('?');
  const params = new URLSearchParams(qs||'');
  const segs = path.split('/').filter(Boolean);
  window.scrollTo({top:0, behavior:'instant' in window ? 'instant':'auto'});
  if(segs.length===0) return Page.home();
  if(segs[0]==='events') return Page.events(params);
  if(segs[0]==='event' && segs[1]) return Page.eventDetail(segs[1]);
  if(segs[0]==='checkout') return Page.checkout();
  if(segs[0]==='confirmation' && segs[1]) return Page.confirmation(segs[1]);
  if(segs[0]==='account') return Page.account();
  if(segs[0]==='contact') return Page.contact();
  return Page.notFound();
}
window.addEventListener('hashchange', route);

Page.events = function(params){

  function currentFiltered(){
    const qv = (document.getElementById('f-q')?.value||'').toLowerCase();
    const pv = document.getElementById('f-pillar')?.value||'';
    const cv = document.getElementById('f-city')?.value||'';
    const maxP = document.getElementById('f-price')?.value || 500000;
    const sort = document.getElementById('f-sort')?.value || 'date';
    let list = EVENTS.filter(e=>{
      const text = (e.title+' '+e.venue+' '+e.city+' '+e.sport).toLowerCase();

    const list = currentFiltered();

  }

    document.getElementById('app').innerHTML = `
    ${Header()}
    <section class="pt-32 pb-10 max-w-7xl mx-auto px-5 md:px-8">

          </div>

            <label class="text-xs uppercase tracking-widest text-bone-300/50 block mb-2">Category</label>
            <select id="f-pillar" class="field w-full rounded-sm px-3 py-2.5 text-sm">

              ${PILLARS.map(p=>`<option ${p.key===pillar?'selected':''}>${p.key}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs uppercase tracking-widest text-bone-300/50 block mb-2">City</label>
            <select id="f-city" class="field w-full rounded-sm px-3 py-2.5 text-sm">
              <option value="">Any City</option>
              ${[...new Set(EVENTS.map(e=>e.city))].map(c=>`<option ${c===city?'selected':''}>${c}</option>`).join('')}
            </select>
          </div>
          <div>
            <label class="text-xs uppercase tracking-widest text-bone-300/50 block mb-2">Max price <span id="f-price-val" class="text-gold-200"></span></label>
            <input id="f-price" type="range" min="10000" max="500000" step="5000" value="500000" class="gold-range w-full"/>
          </div>
          <div>
            <label class="text-xs uppercase tracking-widest text-bone-300/50 block mb-2">Sort by</label>
            <select id="f-sort" class="field w-full rounded-sm px-3 py-2.5 text-sm">
              <option value="date">Date — soonest</option>
              <option value="price">Price — low to high</option>
            </select>
          </div>
        </aside>
        <div>
          <div id="results-count" class="text-sm text-bone-300/50 mb-6"></div>
          <div id="results-grid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </div>
      </div>
    </section>
    ${Footer()}
    ${CartDrawer()}

    const pr = document.getElementById('f-price');
    const prv = document.getElementById('f-price-val');
    prv.textContent = fmtINR(pr.value);
    pr.addEventListener('input', ()=>{ prv.textContent = fmtINR(pr.value); paint(); });
    wireCommon();
    paint();
  }
};
function submitHomeSearch(e){
  e.preventDefault();
  const f = new FormData(e.target);
  const p = new URLSearchParams();
  if(f.get('q')) p.set('q', f.get('q'));
  if(f.get('pillar')) p.set('pillar', f.get('pillar'));
  if(f.get('city')) p.set('city', f.get('city'));
  location.hash = '/events?' + p.toString();
  return false;
}
function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }

function wireTierEvents(){
  document.querySelectorAll('.tier-toggle').forEach(btn=>btn.addEventListener('click', ()=>{
    const id = btn.dataset.tier; const body = document.getElementById('body-'+id);
    const chevron = btn.querySelector('.chevron');
    const open = body.style.maxHeight && body.style.maxHeight !== '0px';
    document.querySelectorAll('.accordion-body').forEach(b=>b.style.maxHeight='0px');
    document.querySelectorAll('.chevron').forEach(c=>c.style.transform='rotate(0deg)');
    if(!open){ body.style.maxHeight = body.scrollHeight+40+'px'; chevron.style.transform='rotate(90deg)'; highlightSeatBlock(id); }
  }));
  document.querySelectorAll('.qty-minus').forEach(b=>b.addEventListener('click',()=>{ const id=b.dataset.tier; ED.qtyMap[id]=Math.max(1,(ED.qtyMap[id]||1)-1); document.querySelector(`.qty-val[data-tier="${id}"]`).textContent=ED.qtyMap[id]; }));
  document.querySelectorAll('.qty-plus').forEach(b=>b.addEventListener('click',()=>{ const id=b.dataset.tier; ED.qtyMap[id]=Math.min(10,(ED.qtyMap[id]||1)+1); document.querySelector(`.qty-val[data-tier="${id}"]`).textContent=ED.qtyMap[id]; }));
  document.querySelectorAll('.add-tier').forEach(b=>b.addEventListener('click',()=>{
    const id=b.dataset.tier; addToCart(ED.ev.id, id, ED.qtyMap[id]||1);
    document.getElementById('mini-summary').innerHTML = cartItemsForEvent(ED.ev.id).map(i=>`
      <div class="flex justify-between"><span class="text-bone-300/70">${i.name} × ${i.qty}</span><span>${fmtINR(i.priceINR*i.qty)}</span></div>`).join('');
    document.querySelectorAll('a.btn-gold[href="#/checkout"]').forEach(a=>a.classList.remove('opacity-40','pointer-events-none'));
  }));
}

            <text x="${b.x+b.w/2}" y="${b.y+b.h/2+4}" fill="${b.tier?'#dcc487':'#8a8a8d'}" font-size="12" text-anchor="middle" font-family="Jost">${b.id}</text>

function onSeatBlockClick(blockId, tierId){
  if(!tierId){ toast(`Block ${blockId} — general seating, see categories below`); return; }
  const el = document.getElementById('body-'+tierId);
  document.querySelectorAll('.accordion-body').forEach(b=>b.style.maxHeight='0px');
  if(el){ el.style.maxHeight = el.scrollHeight+40+'px'; if(typeof el.scrollIntoView==='function'){ el.scrollIntoView({behavior:'smooth', block:'center'}); } }
  highlightSeatBlock(tierId);
}
function highlightSeatBlock(tierId){
  document.querySelectorAll('.seat-block rect').forEach(r=>r.setAttribute('stroke-width','1.2'));

}

function goToAttendees(e){

function StepAttendees(){

    for(let i=0;i<item.qty;i++) rows.push({eventId:item.eventId, tierId:item.tierId, label:`${item.eventTitle} — ${item.name} #${i+1}`});
  });
  State.checkout.attendees = State.checkout.attendees && State.checkout.attendees.length===rows.length ? State.checkout.attendees : rows.map(r=>({...r, name:''}));

}
function goToReview(e){

}

function startPayment(){

  modal.classList.remove('hidden'); modal.classList.add('flex');

function confirmOtp(){

      <svg class="animate-spin mx-auto mb-5" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#dcc487" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9" stroke-linecap="round"/></svg>

  setTimeout(createBooking, 1200);
}
function createBooking(){
  const ref = 'DSE-' + Math.random().toString(36).slice(2,8).toUpperCase();
  const customer = State.checkout.customer;
  const booking = {
    ref, email: customer.email, customer, attendees: State.checkout.attendees,
    items: JSON.parse(JSON.stringify(State.cart)),
    event: EVENTS.find(e=>e.id===State.cart[0].eventId), // primary event for display
    totals: { subtotal:cartSubtotal(), serviceFee:cartServiceFee(), gst:cartGST(), total:cartTotal() },
    status: 'Payment Pending', createdAt: new Date().toISOString(),
    history: [{status:'Payment Pending', at:new Date().toISOString()}],
  };
  State.bookings.unshift(booking); saveBookings();
  if(!State.user){ State.user = {name:customer.name, email:customer.email, phone:customer.phone}; saveUser(); }
  State.cart = []; saveCart();
  State.checkout = { customer:null, attendees:[], terms:false, payment:null, step:1 };
  location.hash = '/confirmation/' + ref;
}

/* ---- Confirmation ---- */
const STATUS_FLOW = ['Payment Pending','Pending Supplier Confirmation','Confirmed','Ticket Pending','Tickets Delivered'];
Page.confirmation = function(ref){
  const b = State.bookings.find(x=>x.ref===ref);
  if(!b) return Page.notFound();
  renderConfirmation(b);
  advanceStatus(b);
};
function advanceStatus(b){
  const idx = STATUS_FLOW.indexOf(b.status);
  if(idx<0 || idx>=STATUS_FLOW.length-1) return;
  setTimeout(()=>{
    const cur = State.bookings.find(x=>x.ref===b.ref);
    if(!cur) return;
    const nextIdx = STATUS_FLOW.indexOf(cur.status)+1;
    cur.status = STATUS_FLOW[nextIdx];
    cur.history.push({status:cur.status, at:new Date().toISOString()});
    saveBookings();
    if(location.hash.includes(b.ref)){ renderConfirmation(cur); advanceStatus(cur); }
  }, 3200);
}

      </div>

/* -------------------------------------------------------------------------
   7. COMMON WIRING — scroll header state, reveal animations, cc input mask
------------------------------------------------------------------------- */
function wireCommon(){
  window.onscroll = ()=>{
    const h = document.getElementById('site-header'); if(!h) return;
  };
  revealObserve();
  const cc = document.getElementById('cc-num');
  if(cc) cc.addEventListener('input', ()=>{ cc.value = cc.value.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim(); });
  const exp = document.getElementById('cc-exp');
  if(exp) exp.addEventListener('input', ()=>{ let v=exp.value.replace(/\D/g,'').slice(0,4); if(v.length>=3) v=v.slice(0,2)+'/'+v.slice(2); exp.value=v; });
  document.querySelectorAll('.pm-tab').forEach(t=>t.addEventListener('click', ()=>{
    document.querySelectorAll('.pm-tab').forEach(x=>x.classList.remove('border-gold-300/60','bg-gold-400/10'));
    t.classList.add('border-gold-300/60','bg-gold-400/10');
    const body = document.getElementById('pay-body');
    if(body) body.innerHTML = t.dataset.pm==='card'?PayCard():t.dataset.pm==='upi'?PayUPI():PayNet();
    wireCommon();
  }));
}
let revealIO;
function revealObserve(){
  if(typeof IntersectionObserver === 'undefined'){
    document.querySelectorAll('.reveal:not(.in)').forEach(el=>el.classList.add('in'));
    return;
  }
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>{
    if(!revealIO){
      revealIO = new IntersectionObserver((entries)=>{
        entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revealIO.unobserve(e.target); } });
      }, {threshold:.12});
    }
    revealIO.observe(el);
  });
}
